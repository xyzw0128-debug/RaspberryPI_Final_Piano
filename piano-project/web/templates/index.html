<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Piano Practice Assistant</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <h1>Piano Practice Assistant</h1>
  <p>현재 상태: <span id="state">-</span></p>
  <p id="stateHelp"></p>

  <section>
    <h2>전원 상태</h2>
    <button id="wakeBtn" onclick="sendCmd({action: 'wake'})">Sleep 해제</button>
    <button id="sleepBtn" onclick="sendCmd({action: 'sleep'})">Sleep 전환</button>
  </section>

  <section>
    <h2>MIDI 입력</h2>
    <p>현재 포트: <span id="midiCurrentPort">-</span></p>
    <select id="midiPortSelect"></select>
    <button id="midiApplyBtn" onclick="applyMidiPort()">MIDI 포트 적용</button>
  </section>

  <section id="selectArea">
    <h2>연습 시작</h2>
    <select id="songSelect">
      {% for song in songs %}
      <option value="{{ song.id }}">{{ song.title }}</option>
      {% endfor %}
    </select>
    <button id="startPracticeBtn" onclick="startPractice()">연습 시작</button>
  </section>

  <section id="practiceArea" style="display:none">
    <h2 id="songTitle"></h2>
    <p>이전 음: <span id="prevNote">-</span></p>
    <p>현재 음: <span id="currentNote">-</span></p>
    <p>다음 음: <span id="nextNote">-</span></p>
    <p id="progress"></p>
    <button id="stopPracticeBtn" onclick="sendCmd({action: 'stop_practice'})">연습 종료</button>
  </section>

  <script src="/static/app.js"></script>
  <script>
    function update(status) {
      const isSleep = status.state === "sleep";
      const isIdle = status.state === "idle";
      const inPractice = status.state === "practice";

      document.getElementById("state").textContent = stateLabel(status.state);
      document.getElementById("stateHelp").textContent = isSleep
        ? "현재 SLEEP 상태입니다. Sleep 해제 버튼 또는 PIR 감지 후 연습할 수 있습니다."
        : "곡을 선택해 연습을 시작하고, MIDI 입력에 따라 LED로 정답/오답을 확인합니다.";
      document.getElementById("wakeBtn").style.display = isSleep ? "inline-block" : "none";
      document.getElementById("sleepBtn").style.display = isIdle ? "inline-block" : "none";

      document.getElementById("selectArea").style.display = inPractice ? "none" : "block";
      document.getElementById("practiceArea").style.display = inPractice ? "block" : "none";
      document.getElementById("songSelect").disabled = isSleep;
      document.getElementById("startPracticeBtn").disabled = isSleep;

      updateMidiPortSelect(status);

      if (inPractice && status.practice) {
        const p = status.practice;
        document.getElementById("songTitle").textContent = p.title;
        document.getElementById("prevNote").textContent = p.prev || "-";
        document.getElementById("currentNote").textContent = p.current || "-";
        document.getElementById("nextNote").textContent = p.next || "-";
        document.getElementById("progress").textContent = `${p.index} / ${p.total}`;
      }

      if (status.error) {
        document.getElementById("stateHelp").textContent = status.error;
      }
    }

    function startPractice() {
      const songId = document.getElementById("songSelect").value;
      sendCmd({action: "start_practice", song_id: songId});
    }

    pollStatus(update);
  </script>
</body>
</html>

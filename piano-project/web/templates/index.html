<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Piano Assistant</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <h1>Piano Assistant</h1>
  <p>현재 상태: <span id="state">-</span></p>
  <p id="stateHelp"></p>
  <button id="wakeBtn" onclick="sendCmd({action: 'wake'})">Sleep 해제</button>
  <button id="sleepBtn" onclick="sendCmd({action: 'sleep'})">Sleep 전환</button>
  <nav>
    <a href="/record"><button id="recordNavBtn">녹음</button></a>
    <a href="/practice"><button id="practiceNavBtn">연습</button></a>
  </nav>
  <script src="/static/app.js"></script>
  <script>
    function update(status) {
      const isSleep = status.state === "sleep";
      document.getElementById("state").textContent = stateLabel(status.state);
      document.getElementById("stateHelp").textContent = isSleep
        ? "현재 SLEEP 상태입니다. 녹음/연습 조작은 막혀 있으며, Sleep 해제 버튼 또는 PIR 감지 후 사용할 수 있습니다."
        : "현재 조작 가능한 대기/동작 상태입니다.";
      document.getElementById("wakeBtn").style.display = isSleep ? "inline-block" : "none";
      document.getElementById("sleepBtn").style.display = status.state === "idle" ? "inline-block" : "none";
      document.getElementById("recordNavBtn").disabled = isSleep;
      document.getElementById("practiceNavBtn").disabled = isSleep;
    }
    pollStatus(update);
  </script>
</body>
</html>
